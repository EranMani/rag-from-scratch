<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Preview — Progress Bars</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--c-canvas); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .stage {
    width: 100%; max-width: 700px;
    padding: 22px 26px;
    background: var(--c-sidebar); border: 1px solid var(--c-border); border-radius: var(--r-lg);
    box-shadow: var(--glow-card);
    display: grid; gap: 14px;
  }
  .row { display: grid; gap: 6px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-family: var(--f-sans); font-size: 13px; color: var(--c-fg); font-weight: 500; }
  .score { font-family: var(--f-mono); font-size: 11px; color: var(--c-muted); }
  .track { height: 6px; background: rgba(36, 29, 74, 0.6); border-radius: var(--r-pill); overflow: hidden; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02); }
  .fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, #f97316, #ec4899, #8b5cf6, #38bdf8); box-shadow: 0 0 14px rgba(236,72,153,0.35); }
</style>
</head>
<body>
  <div class="stage">
    <div class="row">
      <div class="head"><span class="name">01 · RAG Fundamentals</span><span class="score">0.92</span></div>
      <div class="track"><div class="fill" style="width:92%"></div></div>
    </div>
    <div class="row">
      <div class="head"><span class="name">02 · Vector Databases</span><span class="score">0.71</span></div>
      <div class="track"><div class="fill" style="width:71%"></div></div>
    </div>
    <div class="row">
      <div class="head"><span class="name">03 · Retrieval Methods</span><span class="score">0.48</span></div>
      <div class="track"><div class="fill" style="width:48%"></div></div>
    </div>
    <div class="row">
      <div class="head"><span class="name">04 · Chunking Strategies</span><span class="score">0.15</span></div>
      <div class="track"><div class="fill" style="width:15%"></div></div>
    </div>
  </div>
</body>
</html>
