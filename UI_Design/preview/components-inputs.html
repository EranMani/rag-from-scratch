<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Preview — Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--c-canvas); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .stage {
    width: 100%; max-width: 700px;
    padding: 26px;
    background: var(--g-card); border: 1px solid var(--c-border); border-radius: var(--r-lg);
    box-shadow: var(--glow-card);
    display: grid; gap: 14px;
  }
  .row { display: grid; grid-template-columns: 110px 1fr 130px; gap: 14px; align-items: center; }
  .lbl { font-family: var(--f-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--c-muted); text-transform: uppercase; }
  .meta { font-family: var(--f-mono); font-size: 10px; color: var(--c-subtle); text-align: right; }
  .input {
    background: var(--c-surface-alt); border: 1px solid var(--c-border);
    color: var(--c-fg); font-family: var(--f-sans); font-size: 14px;
    padding: 12px 14px; border-radius: var(--r-md); outline: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    transition: box-shadow var(--t-base) var(--ease-out), border-color var(--t-base);
  }
  .input--focus { border-color: rgba(236,72,153,0.6); box-shadow: 0 0 0 3px rgba(236,72,153,0.18), inset 0 1px 0 rgba(255,255,255,0.02); }
  .input--error { border-color: rgba(248,113,113,0.6); box-shadow: 0 0 0 3px rgba(248,113,113,0.18); }
  .input::placeholder { color: var(--c-subtle); }
</style>
</head>
<body>
  <div class="stage">
    <div class="row">
      <span class="lbl">REST</span>
      <input class="input" placeholder="you@team.dev" />
      <span class="meta">border · alt bg</span>
    </div>
    <div class="row">
      <span class="lbl">FOCUS</span>
      <input class="input input--focus" value="you@team.dev" />
      <span class="meta">pink ring 0.18</span>
    </div>
    <div class="row">
      <span class="lbl">ERROR</span>
      <input class="input input--error" value="bad-email" />
      <span class="meta">error ring 0.18</span>
    </div>
  </div>
</body>
</html>
