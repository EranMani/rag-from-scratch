<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Preview — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--c-canvas); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .stage {
    width: 100%; max-width: 700px;
    padding: 24px;
    background: var(--g-card); border: 1px solid var(--c-border); border-radius: var(--r-lg);
    box-shadow: var(--glow-card);
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; align-items: end;
  }
  .col { display:flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 76px; height: 76px; background: var(--c-card); border: 1px solid var(--c-border); box-shadow: inset 0 0 0 1px rgba(139,92,246,0.16), 0 4px 24px rgba(139,92,246,0.10); }
  .box.xs { border-radius: var(--r-xs); }
  .box.sm { border-radius: var(--r-sm); }
  .box.md { border-radius: var(--r-md); }
  .box.lg { border-radius: var(--r-lg); }
  .box.xl { border-radius: var(--r-xl); }
  .box.pl { border-radius: var(--r-pill); }
  .tag { font-family: var(--f-mono); font-size: 11px; color: var(--c-fg); }
  .px { font-family: var(--f-mono); font-size: 10px; color: var(--c-subtle); }
</style>
</head>
<body>
  <div class="stage">
    <div class="col"><div class="box xs"></div><div class="tag">xs</div><div class="px">4</div></div>
    <div class="col"><div class="box sm"></div><div class="tag">sm</div><div class="px">8</div></div>
    <div class="col"><div class="box md"></div><div class="tag">md</div><div class="px">12</div></div>
    <div class="col"><div class="box lg"></div><div class="tag">lg</div><div class="px">16</div></div>
    <div class="col"><div class="box xl"></div><div class="tag">xl</div><div class="px">24</div></div>
    <div class="col"><div class="box pl"></div><div class="tag">pill</div><div class="px">999</div></div>
  </div>
</body>
</html>
