<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Preview — Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--c-canvas); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .stage {
    width: 100%; max-width: 700px;
    padding: 28px 32px;
    background: var(--g-card); border: 1px solid var(--c-border); border-radius: var(--r-lg);
    box-shadow: var(--glow-card);
  }
  .eyebrow { font-family: var(--f-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--c-muted); margin-bottom: 8px; }
  h1 { font-family: var(--f-sans); font-size: 3rem; font-weight: 700; line-height: 1.05; letter-spacing: -0.02em; margin: 0; background: var(--g-sunset); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .meta { font-family: var(--f-mono); font-size: 11px; color: var(--c-subtle); margin-top: 12px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="eyebrow">AI-NATIVE LEARNING SYSTEM</div>
    <h1>Master RAG.<br/>Ship with confidence.</h1>
    <div class="meta">Inter · 48px · 700 · -0.02em · gradient clip (--g-sunset)</div>
  </div>
</body>
</html>
