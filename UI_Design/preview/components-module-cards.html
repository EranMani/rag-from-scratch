<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Preview — Module Cards</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--c-canvas); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .stage {
    width: 100%; max-width: 700px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .card {
    padding: 16px 18px; border-radius: var(--r-lg);
    background: linear-gradient(160deg, rgba(30,22,60,0.92) 0%, rgba(22,16,58,0.92) 100%);
    border: 1px solid var(--c-border);
    box-shadow: 0 4px 28px rgba(139,92,246,0.12);
    display: flex; flex-direction: column; gap: 8px;
  }
  .num { font-family: var(--f-mono); font-size: 11px; color: var(--c-muted); letter-spacing: 0.1em; }
  .title { font-family: var(--f-sans); font-size: 15px; font-weight: 700; color: var(--c-fg-strong); }
  .desc { font-family: var(--f-sans); font-size: 12px; color: var(--c-muted); line-height: 1.5; }
  .bar { height: 3px; border-radius: 2px; background: rgba(36,29,74,0.6); overflow: hidden; }
  .fill { height: 100%; background: linear-gradient(90deg, #f97316, #ec4899, #8b5cf6); }
</style>
</head>
<body>
  <div class="stage">
    <div class="card">
      <div class="num">01</div>
      <div class="title">RAG Fundamentals</div>
      <div class="desc">The architecture, the intuition, the why.</div>
      <div class="bar"><div class="fill" style="width:92%"></div></div>
    </div>
    <div class="card">
      <div class="num">02</div>
      <div class="title">Vector Databases</div>
      <div class="desc">FAISS, Pinecone, Weaviate — and when to use each.</div>
      <div class="bar"><div class="fill" style="width:71%"></div></div>
    </div>
    <div class="card">
      <div class="num">03</div>
      <div class="title">Retrieval Methods</div>
      <div class="desc">Semantic, keyword, hybrid, re-ranking.</div>
      <div class="bar"><div class="fill" style="width:48%"></div></div>
    </div>
    <div class="card">
      <div class="num">04</div>
      <div class="title">Chunking Strategies</div>
      <div class="desc">The decision that breaks more pipelines than any other.</div>
      <div class="bar"><div class="fill" style="width:15%"></div></div>
    </div>
  </div>
</body>
</html>
