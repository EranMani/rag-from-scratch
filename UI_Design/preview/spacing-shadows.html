<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Preview — Shadow & Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--c-canvas); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .stage {
    width: 100%; max-width: 700px;
    padding: 28px;
    background: var(--c-frame); border: 1px solid var(--c-border); border-radius: var(--r-lg);
  }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; align-items: end; }
  .col { display:flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 100%; height: 86px; border-radius: var(--r-md); background: var(--c-card); border: 1px solid var(--c-border); }
  .b1 { box-shadow: 0 4px 28px rgba(139,92,246,0.12); }
  .b2 { box-shadow: 0 8px 36px rgba(139,92,246,0.22); }
  .b3 { box-shadow: 0 6px 32px rgba(236,72,153,0.55); border-color: rgba(249,115,22,0.4); }
  .tag { font-family: var(--f-mono); font-size: 11px; color: var(--c-fg); text-align: center; }
  .meta { font-family: var(--f-mono); font-size: 9.5px; color: var(--c-subtle); text-align: center; }
</style>
</head>
<body>
  <div class="stage">
    <div class="row">
      <div class="col"><div class="box b1"></div><div class="tag">glow-card</div><div class="meta">violet 0.12 · passive</div></div>
      <div class="col"><div class="box b2"></div><div class="tag">glow-card-lift</div><div class="meta">violet 0.22 · hover</div></div>
      <div class="col"><div class="box b3"></div><div class="tag">glow-cta-hover</div><div class="meta">pink 0.55 · CTA</div></div>
    </div>
  </div>
</body>
</html>
