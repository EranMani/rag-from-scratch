<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Preview — Glow Hierarchy</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--c-canvas); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .stage {
    width: 100%; max-width: 700px;
    padding: 28px;
    background: var(--c-frame); border: 1px solid var(--c-border); border-radius: var(--r-lg);
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; align-items: end;
  }
  .col { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .puck {
    width: 100%; height: 92px; border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--f-sans); font-size: 12px; color: var(--c-fg); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .high { background: linear-gradient(135deg, #f97316, #ec4899); color:#fff; box-shadow: 0 6px 32px rgba(236, 72, 153, 0.55); }
  .mid  { background: var(--c-card); border: 1px solid rgba(236, 72, 153, 0.6); box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.18); }
  .low  { background: var(--c-card); border: 1px solid var(--c-border); box-shadow: 0 4px 28px rgba(139, 92, 246, 0.12); }
  .meta { font-family: var(--f-mono); font-size: 10.5px; color: var(--c-muted); text-align: center; line-height: 1.4; }
  .meta strong { color: var(--c-fg); display: block; font-size: 11px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="col">
      <div class="puck high">CTA</div>
      <div class="meta"><strong>HIGH · pink 0.55</strong>Send, primary CTA</div>
    </div>
    <div class="col">
      <div class="puck mid">FOCUS</div>
      <div class="meta"><strong>MID · pink 0.18</strong>Focused input, active tab</div>
    </div>
    <div class="col">
      <div class="puck low">PASSIVE</div>
      <div class="meta"><strong>LOW · violet 0.12</strong>Cards, sidebar</div>
    </div>
  </div>
</body>
</html>
